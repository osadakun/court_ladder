<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>コートラダー</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the current URL and redirects to index.html
      // index.html picks it up via sessionStorage and restores the route
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
